<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-wrap">
    <section class="panel" style="max-width: 760px; margin: 0 auto;">
        <h1 class="title-xl">Add Admin</h1>
        <p class="subtitle">Create a new administrator account with access to management modules.</p>

        <form th:action="@{/admin/users/add}" th:object="${admin}" method="post" class="form-grid">
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}" required>
            </div>
            <div>
                <label for="mail">Email</label>
                <input id="mail" type="email" th:field="*{mail}" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" required>
            </div>
            <div>
                <label for="phone">Phone</label>
                <input id="phone" type="number" th:field="*{phone}">
            </div>
            <div class="row">
                <button type="submit" class="btn btn-primary">Save Admin</button>
                <a href="/admin/users" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
