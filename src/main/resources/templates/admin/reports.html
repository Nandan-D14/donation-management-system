<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Donation Reports</h1>
        <div class="mt-3">
            <p>Total Donations: <strong th:text="${donations.size()}"></strong></p>
            <p>Events Logged: <strong th:text="${eventCount}"></strong></p>
        </div>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${donations}">
                    <td th:text="${d.donationID}"></td>
                    <td th:text="${d.donationType}"></td>
                    <td th:text="${d.quantity}"></td>
                    <td th:text="${d.status}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(donations)}">
                    <td colspan="4">No donations found</td>
                </tr>
            </tbody>
        </table>
        <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
