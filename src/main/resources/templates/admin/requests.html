<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review Requests</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-wrap">
    <section class="panel">
        <h1 class="title-xl">Review Requests</h1>
        <p class="subtitle">View every patient request and approve or deny pending ones.</p>

        <div class="row">
            <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <div class="table-wrap" style="margin-top: 16px;">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Patient</th>
                    <th>Email</th>
                    <th>Type</th>
                    <th>Detail</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requests}">
                    <td th:text="${req.id}">1</td>
                    <td th:text="${req.createdBy != null ? req.createdBy.name : '-'}">Patient</td>
                    <td th:text="${req.createdBy != null ? req.createdBy.mail : '-'}">mail@example.com</td>
                    <td th:text="${req.requestType}">BLOOD</td>
                    <td th:text="${req.requestDetail}">O+</td>
                    <td th:text="${req.quantity}">1</td>
                    <td th:text="${req.status}">PENDING</td>
                    <td>
                        <div class="row" style="margin-top: 0;" th:if="${req.status == 'PENDING'}">
                            <form th:action="@{'/admin/requests/' + ${req.id} + '/approve'}" method="post">
                                <button type="submit" class="btn btn-primary">Approve</button>
                            </form>
                            <form th:action="@{'/admin/requests/' + ${req.id} + '/deny'}" method="post">
                                <button type="submit" class="btn btn-secondary">Deny</button>
                            </form>
                        </div>
                        <span th:if="${req.status != 'PENDING'}" class="text-muted">Finalized</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(requests)}">
                    <td colspan="8">No requests found.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
