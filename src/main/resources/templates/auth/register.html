<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 560px;">
    <h2>Register</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form th:action="@{/register}" method="post" class="mt-3">
        <input class="form-control mb-2" name="name" placeholder="Name" required>
        <input class="form-control mb-2" type="email" name="mail" placeholder="Email" required>
        <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>
        <input class="form-control mb-3" type="number" name="phone" placeholder="Phone (optional)">
        <button class="btn btn-primary" type="submit">Register</button>
        <a href="/login" class="btn btn-link">Login</a>
    </form>
</div>
</body>
</html>
