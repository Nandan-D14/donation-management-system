<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-wrap">
    <section class="panel" style="max-width: 560px; margin: 0 auto;">
        <h1 class="title-xl">Register</h1>
        <p class="subtitle">Create an account and select your role.</p>

        <div th:if="${error}" class="notice" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" class="form-grid">
            <div>
                <label for="name">Name</label>
                <input id="name" name="name" required>
            </div>
            <div>
                <label for="mail">Email</label>
                <input id="mail" type="email" name="mail" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </div>
            <div>
                <label for="phone">Phone</label>
                <input id="phone" type="number" name="phone" placeholder="Optional">
            </div>
            <div>
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="DONOR">Donor</option>
                    <option value="PATIENT">Patient</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="row">
                <button class="btn btn-primary" type="submit">Register</button>
                <a href="/login" class="btn btn-secondary">Login</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
