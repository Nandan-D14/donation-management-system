<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Record Donation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Record Donation</h1>
        <form th:action="@{/donations/add}" th:object="${donation}" method="post" class="mt-3">
            <div class="mb-3">
                <label>Donation Type</label>
                <select th:field="*{donationType}" class="form-control" required>
                    <option value="BLOOD">Blood</option>
                    <option value="ORGAN">Organ</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" th:field="*{quantity}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/donations" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
