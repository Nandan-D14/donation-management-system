<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Donation List</h1>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Quantity</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="donation : ${donations}">
                    <td th:text="${donation.donationID}"></td>
                    <td th:text="${donation.donationType}"></td>
                    <td th:text="${#dates.format(donation.date, 'yyyy-MM-dd')}"></td>
                    <td th:text="${donation.quantity}"></td>
                    <td th:text="${donation.status}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(donations)}">
                    <td colspan="5">No donations found</td>
                </tr>
            </tbody>
        </table>
        <a href="/admin/donations/add" class="btn btn-success">Record Donation</a>
        <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
