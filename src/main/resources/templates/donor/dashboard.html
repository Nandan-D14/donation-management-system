<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Donor Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-wrap">
    <section class="panel" style="max-width: 860px; margin: 0 auto;">
        <h1 class="title-xl">Donor Dashboard</h1>
        <p class="subtitle">Signed in as <strong th:text="${userName}">Donor</strong></p>

        <div class="row">
            <a href="/donor/donate" class="btn btn-primary">Submit Donation</a>
            <a href="/donor/status" class="btn btn-accent">View Donation Status</a>
            <a href="/" class="btn btn-secondary">Home</a>
        </div>
    </section>
</main>
</body>
</html>
