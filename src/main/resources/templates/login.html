<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 720px;">
        <h1>Donation Management System</h1>
        <p class="text-muted">Login to continue</p>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/login}" th:object="${loginAdmin}" method="post" class="mt-3">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{mail}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <a href="/register" class="btn btn-link">Create account</a>
        </form>
    </div>
</body>
</html>
