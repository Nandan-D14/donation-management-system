<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 720px;">
        <h1>Donation Management System</h1>
        <p class="text-muted">Register a new admin account</p>

        <div th:if="${registerError}" class="alert alert-danger" th:text="${registerError}"></div>

        <form th:action="@{/register}" th:object="${registerAdmin}" method="post" class="mt-3">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{mail}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Phone</label>
                <input type="number" th:field="*{phone}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Register</button>
            <a href="/login" class="btn btn-link">Back to login</a>
        </form>
    </div>
</body>
</html>
