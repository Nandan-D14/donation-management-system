<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 760px;">
    <h1>Create Request</h1>
    <p class="text-muted">Sharath Module - Logged-in user creates blood or organ requests via Factory pattern.</p>
    <p class="text-muted" th:if="${currentUserMail != null}">Logged in as: <span th:text="${currentUserMail}"></span></p>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/requests/create}" method="post" class="mt-3">

        <div class="mb-3">
            <label class="form-label">Request Type</label>
            <select class="form-select" name="requestType" required>
                <option value="BLOOD">Blood</option>
                <option value="ORGAN">Organ</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Detail (Blood Group or Organ Type)</label>
            <input type="text" class="form-control" name="detail" placeholder="A+, O-, Kidney, Liver..." required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" name="quantity" min="1" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit Request</button>
        <a href="/requests/list" class="btn btn-secondary">View Requests</a>
        <a href="/" class="btn btn-link">Home</a>
    </form>
</div>
</body>
</html>
