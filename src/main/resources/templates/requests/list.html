<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Request List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1>All Requests</h1>
    <div class="mb-3">
        <a href="/requests/add" class="btn btn-primary">Create Request</a>
        <a href="/" class="btn btn-link">Home</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Email</th>
            <th>Type</th>
            <th>Detail</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.requestID}"></td>
            <td th:text="${req.createdBy.name}"></td>
            <td th:text="${req.createdBy.mail}"></td>
            <td th:text="${req.requestType}"></td>
            <td th:text="${req.requestDetail}"></td>
            <td th:text="${req.quantity}"></td>
            <td th:text="${req.status}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="7">No requests found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
